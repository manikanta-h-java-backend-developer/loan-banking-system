# -----------------------------------------------
# Test Profile — uses H2 in-memory DB
# Prevents tests from connecting to real SQL Server
# -----------------------------------------------

# H2 In-Memory DataSource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JWT configuration
jwt.secret=9f7c2d8a4b1e6f3c8a0d5e7f1b9c2d4a
# 15 minutes in milliseconds
jwt.expiration=1900000

# JPA — auto create schema from entities in test
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable unnecessary features during tests
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false