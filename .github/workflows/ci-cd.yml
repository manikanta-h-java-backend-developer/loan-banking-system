name: CI-CD

on:
  push:
    branches: [dev, stage, main]
  pull_request:
    branches: [dev, stage, main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
        default: dev

permissions:
  contents: read

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and run tests
        run: ./mvnw -B clean verify

      - name: Package artifact
        run: ./mvnw -B -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: loan-banking-system-jar
          path: target/*.jar

  deploy-dev:
    name: Deploy (dev)
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/dev')
    environment:
      name: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-banking-system-jar
          path: target
      - name: Prepare deployment variables
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRY_MS: ${{ secrets.JWT_EXPIRY_MS }}
          JWT_REFRESH_EXPIRY_MS: ${{ secrets.JWT_REFRESH_EXPIRY_MS }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          echo "Preparing deployment for 'dev'"
          echo "Using Spring profile 'dev'"
          # Add your deployment command here (Docker/Kubernetes/VM/SSH/etc.)
      - name: Deploy
        run: |
          echo "Deploying to 'dev' environment"
          echo "Replace this step with your real deployment command"

  deploy-stage:
    name: Deploy (stage)
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'stage') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/stage')
    environment:
      name: stage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-banking-system-jar
          path: target
      - name: Prepare deployment variables
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRY_MS: ${{ secrets.JWT_EXPIRY_MS }}
          JWT_REFRESH_EXPIRY_MS: ${{ secrets.JWT_REFRESH_EXPIRY_MS }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          echo "Preparing deployment for 'stage'"
          echo "Using Spring profile 'stage'"
          # Add your deployment command here (Docker/Kubernetes/VM/SSH/etc.)
      - name: Deploy
        run: |
          echo "Deploying to 'stage' environment"
          echo "Replace this step with your real deployment command"

  deploy-prod:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-banking-system-jar
          path: target
      - name: Prepare deployment variables
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRY_MS: ${{ secrets.JWT_EXPIRY_MS }}
          JWT_REFRESH_EXPIRY_MS: ${{ secrets.JWT_REFRESH_EXPIRY_MS }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          echo "Preparing deployment for 'prod'"
          echo "Using Spring profile 'prod'"
          # Add your deployment command here (Docker/Kubernetes/VM/SSH/etc.)
      - name: Deploy
        run: |
          echo "Deploying to 'prod' environment"
          echo "Replace this step with your real deployment command"

