name: CI-CD

on:
  push:
    branches: [dev, stage, main]
  pull_request:
    branches: [dev, stage, main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
        default: dev

permissions:
  contents: read

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and run tests
        run: ./mvnw -B clean verify

      - name: Package artifact
        run: ./mvnw -B -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: loan-banking-system-jar
          path: target/*.jar

  deploy:
    name: Deploy (${{ matrix.target_env }})
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_env: dev
            branch_ref: refs/heads/dev
            spring_profile: dev
          - target_env: stage
            branch_ref: refs/heads/stage
            spring_profile: stage
          - target_env: prod
            branch_ref: refs/heads/main
            spring_profile: prod

    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == matrix.target_env) ||
      (github.event_name == 'push' && github.ref == matrix.branch_ref)

    environment:
      name: ${{ matrix.target_env }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-banking-system-jar
          path: target

      - name: Prepare deployment variables
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRY_MS: ${{ secrets.JWT_EXPIRY_MS }}
          JWT_REFRESH_EXPIRY_MS: ${{ secrets.JWT_REFRESH_EXPIRY_MS }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          echo "Preparing deployment for '${{ matrix.target_env }}'"
          echo "Using Spring profile '${{ matrix.spring_profile }}'"
          # Add your deployment command here (Docker/Kubernetes/VM/SSH/etc.)

      - name: Deploy
        run: |
          echo "Deploying to '${{ matrix.target_env }}' environment"
          echo "Replace this step with your real deployment command"

